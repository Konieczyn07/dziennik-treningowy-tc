name: Build and Deploy to Azure Web App

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch: 

env:
  AZURE_WEBAPP_NAME: dziennik-treningowy-mkonieczny
  AZURE_WEBAPP_PACKAGE_PATH: '.'
  PHP_VERSION: '8.2'

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: mysqli, pdo_mysql, json, session
          coverage: none
      
      - name: Validate composer.json (if exists)
        run: composer validate --no-check-publish --strict
        continue-on-error: true
      
      - name: Install dependencies (if composer.json exists)
        run: composer install --no-interaction --no-progress --optimize-autoloader
        continue-on-error: true
      
      - name: Check PHP syntax errors
        run: |
          find ./api -name "*.php" -type f -exec php -l {} \;
          find ./front -name "*.php" -type f -exec php -l {} \;
          php -l index.php
      
      - name: Prepare deployment package
        run: |
          # Create deployment directory
          mkdir -p deployment/site/wwwroot
          
          # Copy all files to wwwroot
          cp -r ./api deployment/site/wwwroot/
          cp -r ./database deployment/site/wwwroot/ 2>/dev/null || true
          cp -r ./front deployment/site/wwwroot/
          cp index.php deployment/site/wwwroot/
          cp Dockerfile deployment/site/wwwroot/ 2>/dev/null || true
          
          # Copy any other necessary files
          cp -r ./assets deployment/site/wwwroot/ 2>/dev/null || true
          cp -r ./css deployment/site/wwwroot/ 2>/dev/null || true
          
          # Create deployment archive
          cd deployment
          zip -r ../release.zip .
      
      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: php-app
          path: release.zip
          retention-days: 7

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    
    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: php-app
      
      - name: Unzip artifact
        run: unzip release.zip -d ./deployment_package
      
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: AZUREAPPSERVICE_PUBLISHPROFILE_0783D54C10804F1DA7306BE9CD976F81
          package: ./deployment_package
      
      - name: Verify deployment
        run: |
          echo "Deployment completed to ${{ env.AZURE_WEBAPP_NAME }}"
          curl -I https://${{ env.AZURE_WEBAPP_NAME }}.azurewebsites.net/front/index.html

  test:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'pull_request'
    
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: php-app
      
      - name: Unzip artifact
        run: unzip release.zip -d ./test_package
      
      - name: Setup PHP for testing
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          
      - name: Run PHP unit tests (if they exist)
        run: |
          cd test_package/site/wwwroot
          # Add your test commands here if you have PHPUnit tests
          # php vendor/bin/phpunit --configuration phpunit.xml
        continue-on-error: true
      
      - name: Run API endpoint tests
        run: |
          # Start a local PHP server for testing
          cd test_package/site/wwwroot
          php -S localhost:8000 > /dev/null 2>&1 &
          sleep 5
          
          # Test API endpoints
          echo "Testing API endpoints..."
          curl -f http://localhost:8000/api/index.php || echo "API test failed"
          curl -f http://localhost:8000/api/check.php || echo "Auth check test failed"
          
          # Kill the PHP server
          kill %1
