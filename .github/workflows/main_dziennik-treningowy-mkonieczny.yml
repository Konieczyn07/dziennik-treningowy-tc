name: Build and deploy PHP app to Azure Web App - dziennik-treningowy-mkonieczny

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
    
      - name: Setup PHP configuration
        run: |
          sudo cp php.ini-production /etc/php/8.2/cli/php.ini || true
          echo "session.auto_start = 0" | sudo tee -a /etc/php/8.2/cli/conf.d/99_session.ini
      
      - name: Start PHP built-in server for testing
        run: |
          php -S localhost:8000 -t . > /dev/null 2>&1 &
          sleep 3
      
      - name: Setup Python for API tests
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pytest pytest-cov
      
      - name: Verify test file exists
        run: |
          if [ -f "test_api.py" ]; then
            echo "test_api.py found"
            cat test_api.py | head -20
          else
            echo "test_api.py not found"
            ls -la
            exit 1
          fi
      
      - name: Run API tests with pytest
        run: |
          # Run tests against local PHP server
          python -m pytest test_api.py -v --tb=short
        env:
          API_BASE_URL: "http://localhost:8000"
      
      - name: Run tests with coverage (if supported)
        run: |
          python -m pytest test_api.py -v --cov=. --cov-report=term --cov-report=xml || true
      
      - name: Test authentication endpoints
        run: |
          # Quick health check of auth endpoints
          curl -f http://localhost:8000/api/auth/check || echo "Auth endpoint check"
          curl -X POST http://localhost:8000/api/auth/register \
            -H "Content-Type: application/json" \
            -d '{"username":"testuser","email":"test@test.com","password":"Test123!"}' \
            || echo "Registration test completed"
      
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Check if composer.json exists
        id: check_files
        uses: andstor/file-existence-action@v1
        with:
          files: 'composer.json'

      - name: Run composer install if composer.json exists
        if: steps.check_files.outputs.files_exists == 'true'
        run: composer validate --no-check-publish && composer install --prefer-dist --no-progress


      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: php-app
          path: .

  deploy:
    runs-on: ubuntu-latest
    needs: build
    
    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: php-app
      
      - name: 'Deploy to Azure Web App'
        uses: azure/webapps-deploy@v3
        id: deploy-to-webapp
        with:
          app-name: 'dziennik-treningowy-mkonieczny'
          slot-name: 'Production'
          package: .
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_0783D54C10804F1DA7306BE9CD976F81 }}